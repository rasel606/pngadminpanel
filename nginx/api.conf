# =============================================================================
# nginx/api.conf — Nginx config for the Express.js Backend API
#
# Domain: api.tiger55.online
# Server: 161.97.180.157
# Assumes Express is running on port 5000 (set PORT=5000 in .env).
# Copy to: /etc/nginx/sites-available/api.tiger55.online
# Enable:  sudo ln -s /etc/nginx/sites-available/api.tiger55.online \
#                      /etc/nginx/sites-enabled/
#
# SSL certificate (Let's Encrypt via Certbot):
#   sudo certbot --nginx -d api.tiger55.online
# =============================================================================

upstream express_backend {
    server 127.0.0.1:5000;
    keepalive 64;
}

# Redirect all HTTP traffic to HTTPS to prevent Mixed Content errors
# (browsers block ws:// WebSocket connections from HTTPS pages).
server {
    listen 80;
    listen [::]:80;
    server_name api.tiger55.online;

    return 301 https://$host$request_uri;
}

# HTTPS server — terminates TLS and proxies to the Express backend.
# All WebSocket (Socket.io) upgrades arrive here as WSS and are forwarded
# to the backend as plain WS on the loopback interface.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.tiger55.online;

    # SSL certificate managed by Certbot / Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/api.tiger55.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.tiger55.online/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Max upload size (adjust as needed)
    client_max_body_size 50M;

    location / {
        proxy_pass         http://express_backend;
        proxy_http_version 1.1;

        # WebSocket / Socket.io support (wss:// → ws:// on loopback)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # Pass real client information to Express
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # Timeouts — keep long-lived WebSocket connections alive
        proxy_connect_timeout  60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Logging
    access_log /var/log/nginx/tiger55_api_access.log;
    error_log  /var/log/nginx/tiger55_api_error.log;
}

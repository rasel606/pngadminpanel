# =============================================================================
# nginx/frontend.conf — Nginx config for the React (Vite) Frontend
#
# Domain: tiger55.online / www.tiger55.online
# Server: 161.97.180.157
# Copy to: /etc/nginx/sites-available/tiger55.online
# Enable:  sudo ln -s /etc/nginx/sites-available/tiger55.online \
#                      /etc/nginx/sites-enabled/
#
# SSL certificate (Let's Encrypt via Certbot):
#   sudo certbot --nginx -d tiger55.online -d www.tiger55.online
# =============================================================================

# Redirect all HTTP traffic to HTTPS so the page is always served securely.
# Browsers block ws:// WebSocket connections from HTTPS pages (Mixed Content),
# so ensuring the frontend is always on HTTPS is a prerequisite for wss://.
server {
    listen 80;
    listen [::]:80;
    server_name tiger55.online www.tiger55.online;

    return 301 https://$host$request_uri;
}

# HTTPS server — terminates TLS and serves the pre-built Vite/React app.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name tiger55.online www.tiger55.online;

    # SSL certificate managed by Certbot / Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/tiger55.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tiger55.online/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Document root — must match the path used in deploy-frontend.sh
    root /var/www/tiger55-frontend;
    index index.html;

    # React Router support: serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (Vite generates hashed filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;
    gzip_min_length 256;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Logging
    access_log /var/log/nginx/tiger55_frontend_access.log;
    error_log  /var/log/nginx/tiger55_frontend_error.log;
}

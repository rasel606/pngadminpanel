# =============================================================================
# nginx/frontend.conf — Nginx config for the React (Vite) Frontend
#
# Domain: tiger55.online / www.tiger55.online
# Server: 161.97.180.157
# Copy to: /etc/nginx/sites-available/tiger55.online
# Enable:  sudo ln -s /etc/nginx/sites-available/tiger55.online \
#                      /etc/nginx/sites-enabled/
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name tiger55.online www.tiger55.online;

    # Document root — must match the path used in deploy-frontend.sh
    root /var/www/tiger55-frontend;
    index index.html;

    # React Router support: serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (Vite generates hashed filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;
    gzip_min_length 256;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Logging
    access_log /var/log/nginx/tiger55_frontend_access.log;
    error_log  /var/log/nginx/tiger55_frontend_error.log;
}
# Certbot will automatically append the HTTPS (443) server block below
# when you run: sudo certbot --nginx -d tiger55.online -d www.tiger55.online
